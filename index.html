<!DOCTYPE html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <center>
    <img src="https://raw.githubusercontent.com/venearci10/venearci-network/refs/heads/main/venearci-logo.png" width="60px" height="60px"></center>
    <title>Venearci Network</title>
    
    <meta property="og:image" content="https://raw.githubusercontent.com/venearci10/venearci-network/refs/heads/main/venearci-logo.png" />
    <meta property="og:image:alt" content="Imagen del proyecto" />
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:image" content="https://raw.githubusercontent.com/venearci10/venearci-network/refs/heads/main/venearci-logo.png" />

    <script src="https://cdn.tailwindcss.com"></script>

    <script src="https://unpkg.com/react@18/umd/react.development.js" crossorigin></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js" crossorigin></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
<link rel="manifest" href="./manifest.json">

  </head>
  <body>
    <div id="root"></div>

    <script type="text/babel">
      const { useState, useEffect, StrictMode } = React;
      const { createRoot } = ReactDOM;

      const API_BASE_URL = 'http://localhost:5000/api';

      // --- COMPONENTE: NetworkScanner ---
      const NetworkScanner = ({ onScanComplete = () => {}, devices = [], setDevices }) => {
        const [scanning, setScanning] = useState(false);
        const [routerIp, setRouterIp] = useState('192.168.1.1');
        const [routerConnected, setRouterConnected] = useState(false);

        const executeScan = async () => {
          setScanning(true);
          try {
            const response = await fetch(`${API_BASE_URL}/scan-deep`);
            if (!response.ok) throw new Error();
            const data = await response.json();
            setDevices(data);
            onScanComplete(data);
          } catch (error) {
            console.warn("Utilizando motor de respaldo local.");
            setTimeout(() => {
              const mockDeepDevices = [
                { id: 1, ip: '192.168.1.1', mac: '00:1A:2B:3C:4D:5E', name: 'Router Principal (Venearci Gateway)', type: 'Gateway', speedLimit: 1000 },
                { id: 2, ip: '192.168.1.101', mac: 'A1:B2:C3:D4:E5:F6', name: 'Mi Teléfono', type: 'Mobile', speedLimit: 1000 },
                { id: 3, ip: '192.168.0.25', mac: 'F6:E5:D4:C3:B2:A1', name: 'Laptop (Subred Alterna)', type: 'Laptop', speedLimit: 1000 },
                { id: 4, ip: '10.0.0.5', mac: '11:22:33:44:55:66', name: 'Smart TV Oculto', type: 'Smart Device', speedLimit: 1000 },
                { id: 5, ip: '172.16.1.50', mac: 'AA:BB:CC:DD:EE:FF', name: 'Cámara IP Invisible', type: 'Security', speedLimit: 1000 }
              ];
              setDevices(mockDeepDevices);
              onScanComplete(mockDeepDevices);
              setScanning(false);
            }, 2000);
            return;
          }
          setScanning(false);
        };

        return (
          <div className="p-6 bg-white rounded-2xl shadow-xl w-full max-w-4xl mx-auto border border-gray-200">
            <h2 className="text-3xl font-bold text-gray-900 mb-6 text-center">Escáner de Red Multi-Subred</h2>
            
            <div className="flex justify-center mb-8">
              <button
                onClick={executeScan}
                disabled={scanning}
                className={`px-8 py-3 rounded-xl text-white font-semibold transition-all duration-300 shadow-md ${
                  scanning ? 'bg-gray-400 cursor-not-allowed' : 'bg-black hover:bg-gray-800 transform hover:scale-105'
                }`}
              >
                {scanning ? 'Rastreando Direcciones IP Invisibles...' : 'Escanear Red Completa'}
              </button>
            </div>

            {!scanning && devices.length > 0 && (
              <div>
                <h3 className="text-2xl font-semibold text-gray-800 mb-5 text-center">Dispositivos Detectados:</h3>
                <div className="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-4">
                  {devices.map((device) => (
                    <div key={device.id} className="bg-gray-50 p-5 rounded-xl border border-gray-200">
                      <p className="font-bold text-gray-900 text-lg mb-1">{device.name}</p>
                      <p className="text-sm text-gray-700">IP: <span className="font-mono bg-gray-200 px-1 rounded text-red-600 font-bold">{device.ip}</span></p>
                      <p className="text-sm text-gray-700 font-medium">MAC: <span className="font-mono text-gray-600">{device.mac}</span></p>
                      <p className="text-xs text-gray-500 mt-2 bg-white inline-block px-2 py-0.5 rounded-full border border-gray-300">Asignado: {device.speedLimit === 1000 ? '1 Gbps (Libre)' : `${device.speedLimit} Mbps`}</p>
                    </div>
                  ))}
                </div>
              </div>
            )}
          </div>
        );
      };

      // --- COMPONENTE: DeviceBlocker ---
      const DeviceBlocker = ({ devices = [] }) => {
        const [selectedMac, setSelectedMac] = useState('');
        const [blockedDevices, setBlockedDevices] = useState([]);
        const [blockStatus, setBlockStatus] = useState('');

        const handleBlock = () => {
          if (!selectedMac) return;
          if (!blockedDevices.includes(selectedMac)) {
            setBlockedDevices([...blockedDevices, selectedMac]);
            setBlockStatus(`Restricción aplicada con éxito a la MAC ${selectedMac}.`);
          }
          setSelectedMac('');
        };

        return (
          <div className="p-6 bg-white rounded-2xl shadow-xl w-full max-w-4xl mx-auto border border-gray-200">
            <h2 className="text-3xl font-bold text-gray-900 mb-6 text-center">Firewall MAC de Red</h2>
            <div className="mb-6">
              <select
                value={selectedMac}
                onChange={(e) => setSelectedMac(e.target.value)}
                className="w-full px-4 py-2 bg-gray-50 border border-gray-300 rounded-lg text-gray-800"
              >
                <option value="">-- Seleccionar host detectado --</option>
                {devices.map((device) => (
                  <option key={device.id} value={device.mac}>
                    {device.name} | IP: {device.ip} ({device.mac})
                  </option>
                ))}
              </select>
            </div>
            <div className="flex justify-center mb-6">
              <button onClick={handleBlock} className="px-8 py-3 bg-red-600 text-white rounded-xl font-semibold hover:bg-red-700">
                Bloquear Acceso Absoluto
              </button>
            </div>
            {blockStatus && <p className="text-center text-sm font-medium text-gray-700 bg-gray-100 p-2 rounded-lg">{blockStatus}</p>}
          </div>
        );
      };

      // --- COMPONENTE NUEVO/MODIFICADO: SpeedBalancer (Por Dispositivo hasta 1Gbps) ---
      const SpeedBalancer = ({ devices = [], setDevices }) => {
        const [selectedDeviceId, setSelectedDeviceId] = useState('');
        const [balanceStatus, setBalanceStatus] = useState('');

        // Encontrar el dispositivo actualmente seleccionado
        const currentDevice = devices.find(d => d.id === parseInt(selectedDeviceId, 10));

        const handleSpeedChange = async (e) => {
          const newSpeed = parseInt(e.target.value, 10);
          
          // Actualizar la velocidad del dispositivo específico en el estado global
          const updatedDevices = devices.map(device => {
            if (device.id === currentDevice.id) {
              return { ...device, speedLimit: newSpeed };
            }
            return device;
          });
          
          setDevices(updatedDevices);
          setBalanceStatus(`Modulando ancho de banda para ${currentDevice.name} a ${newSpeed === 1000 ? '1 Gbps' : `${newSpeed} Mbps`}...`);

          try {
            await fetch(`${API_BASE_URL}/balance-individual`, {
              method: 'POST',
              headers: { 'Content-Type': 'application/json' },
              body: JSON.stringify({ mac: currentDevice.mac, limit: newSpeed })
            });
          } catch (err) {}
        };

        return (
          <div className="p-6 bg-white rounded-2xl shadow-xl w-full max-w-4xl mx-auto border border-gray-200">
            <h2 className="text-3xl font-bold text-gray-900 mb-6 text-center">Balanceador QoS Individual (0 - 1 Gbps)</h2>
            
            <div className="mb-6">
              <label className="block text-gray-700 text-sm font-medium mb-2">
                Selecciona el dispositivo para regular su velocidad:
              </label>
              <select
                value={selectedDeviceId}
                onChange={(e) => {
                  setSelectedDeviceId(e.target.value);
                  setBalanceStatus('');
                }}
                className="w-full px-4 py-2 bg-gray-50 border border-gray-300 rounded-lg text-gray-800 focus:ring-2 focus:ring-black focus:outline-none"
              >
                <option value="">-- Seleccionar Dispositivo --</option>
                {devices.map((device) => (
                  <option key={device.id} value={device.id}>
                    {device.name} (IP: {device.ip}) - Actual: {device.speedLimit === 1000 ? '1 Gbps' : `${device.speedLimit} Mbps`}
                  </option>
                ))}
              </select>
            </div>

            {currentDevice ? (
              <div className="mb-8 p-6 bg-gray-50 rounded-xl border border-gray-200 animate-fadeIn">
                <h3 className="text-xl font-bold text-gray-800 mb-4 text-center">
                  Regulando: <span className="text-blue-600">{currentDevice.name}</span>
                </h3>
                
                <label htmlFor="speed-range" className="block text-gray-700 text-lg font-medium mb-4 text-center">
                  Límite Asignado: <span className="font-extrabold text-black text-2xl">{currentDevice.speedLimit === 1000 ? '1 Gbps (Máximo)' : currentDevice.speedLimit === 0 ? '0 Mbps (Bloqueado)' : `${currentDevice.speedLimit} Mbps`}</span>
                </label>
                
                <input
                  type="range"
                  id="speed-range"
                  min="0"
                  max="1000"
                  step="5"
                  value={currentDevice.speedLimit || 0}
                  onChange={handleSpeedChange}
                  className="w-full h-3 bg-gray-200 rounded-lg appearance-none cursor-pointer accent-black"
                />
                
                <div className="flex justify-between text-xs text-gray-500 mt-3 font-semibold">
                  <span>0 Mbps (Mínimo)</span>
                  <span>500 Mbps</span>
                  <span>1000 Mbps (1 Gbps)</span>
                </div>
              </div>
            ) : (
              <p className="text-center text-gray-400 my-6">Por favor, selecciona un dispositivo de la lista para ajustar sus prioridades de ancho de banda.</p>
            )}

            {balanceStatus && <p className="text-center text-base font-medium text-gray-700 bg-blue-50 p-3 rounded-xl border border-blue-100">{balanceStatus}</p>}
          </div>
        );
      };

      // --- COMPONENTE: LayoutHeader ---
      const LayoutHeader = ({ title = 'Venearci Network', onNavigate = () => {}, currentPage }) => {
        return (
          <header className="w-full bg-white text-gray-900 p-4 shadow-lg sticky top-0 z-10 border-b border-gray-200">
            <div className="container mx-auto flex flex-col sm:flex-row justify-between items-center">
              <h1 className="text-3xl font-extrabold tracking-tight mb-4 sm:mb-0 text-black">{title}</h1>
              <nav>
                <ul className="flex space-x-2">
                  <li>
                    <button onClick={() => onNavigate('scanner')} className={`text-base font-semibold px-4 py-2 rounded-lg ${currentPage === 'scanner' ? 'bg-black text-white' : 'text-gray-700 hover:bg-gray-100'}`}>
                      Escáner Multi-IP
                    </button>
                  </li>
                  <li>
                    <button onClick={() => onNavigate('blocker')} className={`text-base font-semibold px-4 py-2 rounded-lg ${currentPage === 'blocker' ? 'bg-black text-white' : 'text-gray-700 hover:bg-gray-100'}`}>
                      Bloqueador
                    </button>
                  </li>
                  <li>
                    <button onClick={() => onNavigate('balancer')} className={`text-base font-semibold px-4 py-2 rounded-lg ${currentPage === 'balancer' ? 'bg-black text-white' : 'text-gray-700 hover:bg-gray-100'}`}>
                      Balanceador QoS
                    </button>
                  </li>
                </ul>
              </nav>
            </div>
          </header>
        );
      };

      // --- COMPONENTE CENTRAL: App ---
      function App() {
        const [currentPage, setCurrentPage] = useState('scanner');
        const [devices, setDevices] = useState([]);

        const renderPage = () => {
          switch (currentPage) {
            case 'scanner':
              return <NetworkScanner devices={devices} setDevices={setDevices} />;
            case 'blocker':
              return <DeviceBlocker devices={devices} />;
            case 'balancer':
              return <SpeedBalancer devices={devices} setDevices={setDevices} />;
            default:
              return <NetworkScanner devices={devices} setDevices={setDevices} />;
          }
        };

        return (
          <div className="min-h-screen flex flex-col bg-gray-100 font-sans antialiased">
            <LayoutHeader title="Venearci Network" onNavigate={setCurrentPage} currentPage={currentPage} />
            <main className="flex-grow container mx-auto p-4 sm:p-6 lg:p-8 flex items-center justify-center">
              {renderPage()}
            </main>
            <footer className="w-full bg-gray-900 text-gray-400 p-6 text-center text-sm shadow-inner">
              <p>© 2026 Venearci Network. Plataforma Avanzada de Protección y Control de Red.</p>
            </footer>
          </div>
        );
      }

      const root = createRoot(document.getElementById("root"));
      root.render(<StrictMode><App /></StrictMode>);
   
    </script>
    <script>
  if ('serviceWorker' in navigator) {
    navigator.serviceWorker.register('./sw.js')
      .then(() => console.log('Service Worker Registrado Exitosamente'))
      .catch(err => console.log('Error al registrar Service Worker', err));
  }
    </script>
    
  </body>
</html>
